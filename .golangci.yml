version: "2"

linters:
    enable:
        # --- БЕЗОПАСНОСТЬ И УТЕЧКИ РЕСУРСОВ ---
        - gosec           # Поиск уязвимостей и небезопасного кода
        - noctx           # Защита от отправки HTTP-запросов без context.Context

        # --- ЛОГИКА, ОШИБКИ И ВРЕМЯ ---
        - asasalint       # Проверка передачи слайсов в variadic-функции
        - durationcheck   # Защита от багов с перемножением time.Duration
        - errorlint       # Требует errors.Is / errors.As вместо сравнения через ==
        - staticcheck     # Глубокий логический и многопоточный анализ кода

        # --- СОВРЕМЕННЫЙ GO И ПРОИЗВОДИТЕЛЬНОСТЬ ---
        - gocritic        # Общие оптимизации и современные код-стайлы
        - intrange        # Перевод циклов на синтаксис 'for range 10' (Go 1.22+)
        - modernize       # Авто-рефакторинг под фичи новых версий стандартной библиотеки
        - perfsprint      # Оптимизация работы со строками вместо лишних fmt.Sprintf
        - prealloc        # Предлагает заранее выделять память для слайсов (make)

        # --- АРХИТЕКТУРА И ИНТЕРФЕЙСЫ ---
        - gocognit        # Контроль когнитивной сложности функций
        - iface           # Защита от Interface Pollution (лишних интерфейсов)
        - interfacebloat  # Защита от слишком раздутых интерфейсов (>10 методов)

        # --- СТИЛЬ И ЧИСТОТА КОДА ---
        - misspell        # Поиск опечаток в английских словах в комментариях
        - nolintlint      # Проверяет, чтобы комментарии //nolint были точечными
        - predeclared     # Запрещает затенение встроенных типов (var int)
        - recvcheck       # Требует консистентности типов ресиверов у методов
        - revive          # Главный расширяемый линтер стиля
        - unconvert       # Удаляет лишние (избыточные) приведения типов
        - usestdlibvars   # Заменяет строки на стандартные константы (http.MethodPost)
        - whitespace      # Следит за правильными пустыми строками в функциях

        # --- СИСТЕМНОЕ ЛОГИРОВАНИЕ ---
        - sloglint        # Защита от багов и !BADKEY в логах пакета log/slog
    exclusions:
        presets:
            - std-error-handling
    settings:
        revive:
            rules:
                -   name: exported
                    disabled: true