version: 2

builds:
  - id: bx-pack
    main: ./cmd/bx-pack
    binary: bx-pack
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Nemial/bx-pack/internal/cli.buildVersion={{.Version}}
      - -X github.com/Nemial/bx-pack/internal/cli.buildCommit={{.Commit}}
      - -X github.com/Nemial/bx-pack/internal/cli.buildDate={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^Merge"
      - "^WIP"

release:
  github:
    owner: Nemial
    name: bx-pack

snapshot:
  version_template: "{{ incpatch .Version }}-next"
