# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
    # =========================================================================
    # ОСНОВНЫЕ КОМАНДЫ РАЗРАБОТКИ (Главный уровень)
    # =========================================================================

    build:
        desc: Собрать бинарный файл bx-pack в директорию dist
        cmds:
            - mkdir -p dist
            - go build -o ./dist/bx-pack ./cmd/bx-pack

    test:
        desc: Запустить все тесты с детектором состояния гонки
        cmds:
            - go test -race ./...

    lint:
        desc: Проверить код линтером golangci-lint
        cmds:
            - golangci-lint run ./...

    check:
        desc: Быстрая локальная проверка кода перед коммитом
        cmds:
            - task: go:vet
            - task: lint
            - task: test

    ci:
        desc: Полный пайплайн проверки (используется в CI/CD)
        deps:
            - task: go:fmt
            - task: go:vet
            - task: lint
            - task: test

    # =========================================================================
    # ОБСЛУЖИВАНИЕ ИНСТРУМЕНТАРИЯ GO (Неймспейс go:)
    # =========================================================================

    go:fmt:
        desc: Отформатировать Go-код (go fmt)
        cmds:
            - go fmt ./...

    go:vet:
        desc: Запустить статический анализатор go vet
        cmds:
            - go vet ./...

    go:fix:
        desc: Запустить go fix для обновления старого API
        cmds:
            - go fix ./...

    # =========================================================================
    # УПРАВЛЕНИЕ ЗАВИСИМОСТЯМИ (Неймспейс deps:)
    # =========================================================================

    deps:check:
        desc: Проверить зависимости на наличие новых версий
        cmds:
            - go list -m -u all

    deps:update:
        desc: Обновить Go-зависимости до последних версий
        cmds:
            - go get -u ./...
            - go mod tidy

    # =========================================================================
    # РЕЛИЗЫ (Неймспейс release:)
    # =========================================================================

    release:snapshot:
        desc: Тестовый релиз через GoReleaser (без публикации)
        cmds:
            - goreleaser release --snapshot --clean