# Простой пример конфигурации модуля Битрикс
# Идеально подходит для небольших модулей с классической структурой.

module:
  id: "myvendor.simple"         # ID модуля (по стандартам Битрикс)
  version: "1.0.0"              # Версия модуля
  name: "Простой модуль"        # Название для отчетов
  install: "install"            # Папка с инсталлятором (db, components, etc.)

build:
  sourceDir: "."                # Собираем из текущей папки
  outputDir: "./dist"           # Результат в папку dist
  archiveName: "{module.id}.zip" # Имя архива без версии

exclude:
  - ".git"
  - ".bxpack"
  - "dist"
